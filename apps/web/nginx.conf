worker_processes auto;
pid /var/run/nginx.pid;
events { worker_connections 1024; }
http {
  include /etc/nginx/mime.types;
  server_tokens off;
  access_log /dev/stdout;
  error_log /dev/stderr warn;
  server {
    listen 8080;
    root /usr/share/nginx/html;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Content-Security-Policy "default-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'none'; form-action 'none'" always;
    location = /health/live { access_log off; default_type application/json; return 200 '{"status":"ok"}'; }
    location /api/ {
      proxy_pass http://api:8000/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Request-ID $request_id;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_connect_timeout 3s;
      proxy_read_timeout 30s;
    }
    location / { try_files $uri /index.html; }
  }
}
