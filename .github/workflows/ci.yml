name: CI

on:
  pull_request:
  push:
    branches: [main, phase-1-completion]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12.11'
          cache: pip

      - name: Install backend dependencies
        run: python -m pip install --disable-pip-version-check -e '.[dev]'

      - name: Verify formatting
        run: python -m ruff format --check .

      - name: Lint backend
        run: python -m ruff check .

      - name: Type-check backend
        run: python -m mypy apps/api/src

      - name: Run backend tests with coverage
        run: python -m pytest --junitxml=test-results.xml --cov-report=xml

      - name: Run static security analysis
        run: python -m bandit -c pyproject.toml -r apps/api/src

      - name: Audit Python dependencies
        run: python -m pip_audit

      - name: Verify Python package build
        run: python -m build

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: quality-reports
          path: |
            test-results.xml
            coverage.xml
          if-no-files-found: warn
          retention-days: 14

  container:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: '22.17.1'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: apps/web

      - name: Lint frontend
        run: npm run lint
        working-directory: apps/web

      - name: Test frontend
        run: npm test
        working-directory: apps/web

      - name: Build frontend
        run: npm run build
        working-directory: apps/web

      - name: Audit frontend dependencies
        run: npm audit --audit-level=high
        working-directory: apps/web

      - name: Validate Compose configuration
        run: docker compose config --quiet

      - name: Build container images
        run: docker compose build

      - name: Start and wait for the stack
        run: docker compose up --detach --wait --wait-timeout 120

      - name: Verify service health
        run: |
          docker compose ps
          curl --fail --silent --show-error http://127.0.0.1:8000/health/ready
          curl --fail --silent --show-error http://127.0.0.1:8080/health/live

      - name: Validate Alembic migrations against PostgreSQL
        run: docker compose exec -T api alembic upgrade head

      - if: always()
        name: Collect container logs
        run: docker compose logs --no-color

      - if: always()
        name: Tear down stack
        run: docker compose down --volumes
