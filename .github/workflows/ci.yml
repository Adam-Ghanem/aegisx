name: CI
on:
  pull_request:
  push:
    branches: [main]
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  quality:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with: {persist-credentials: false}
      - uses: actions/setup-python@v5
        with: {python-version: '3.12.11', cache: pip}
      - run: python -m pip install --disable-pip-version-check -e '.[dev]'
      - run: python -m ruff format --check .
      - run: python -m ruff check .
      - run: python -m mypy apps/api/src
      - run: python -m pytest --junitxml=test-results.xml --cov-report=xml
      - run: python -m bandit -c pyproject.toml -r apps/api/src
      - run: python -m pip_audit
      - uses: actions/upload-artifact@v4
        if: always()
        with: {name: quality-reports, path: "test-results.xml\ncoverage.xml", if-no-files-found: warn, retention-days: 14}
  container:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with: {persist-credentials: false}
      - uses: actions/setup-node@v4
        with: {node-version: '22.17.1', cache: npm, cache-dependency-path: apps/web/package-lock.json}
      - run: npm ci
        working-directory: apps/web
      - run: npm run build
        working-directory: apps/web
      - run: npm audit --audit-level=high
        working-directory: apps/web
      - run: docker compose config --quiet
      - run: docker compose build
      - run: docker compose up --detach --wait --wait-timeout 120
      - run: curl --fail --silent --show-error http://127.0.0.1:8000/health/ready
      - run: curl --fail --silent --show-error http://127.0.0.1:8080/health/live
      - if: always()
        run: docker compose logs --no-color
      - if: always()
        run: docker compose down --volumes
