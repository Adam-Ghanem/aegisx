<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200" role="img" aria-labelledby="title desc">
  <title id="title">AegisX official logo</title>
  <desc id="desc">Glossy red shield and X emblem with the AegisX wordmark on a transparent background.</desc>
  <defs>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff3b42"/>
      <stop offset="0.38" stop-color="#ff151d"/>
      <stop offset="0.72" stop-color="#e00614"/>
      <stop offset="1" stop-color="#9b000c"/>
    </linearGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2b2d32"/>
      <stop offset="1" stop-color="#0d0f12"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="7" flood-color="#370006" flood-opacity="0.35"/>
    </filter>
  </defs>

  <g fill="none" stroke="url(#red)" stroke-linecap="round" stroke-linejoin="round" filter="url(#shadow)">
    <path d="M362 168 L545 98 Q600 78 655 98 L838 168 Q892 188 900 244 Q908 300 865 349 L654 560 Q630 584 600 584 Q570 584 546 560 L335 349 Q292 300 300 244 Q308 188 362 168 Z" stroke-width="38"/>
    <path d="M302 380 Q304 520 389 638 L535 816 Q562 848 600 848 Q638 848 665 816 L811 638 Q896 520 898 380" stroke-width="38"/>
    <path d="M378 310 L822 704" stroke-width="32"/>
    <path d="M822 310 L378 704" stroke-width="32"/>
  </g>

  <g font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="700" letter-spacing="-12">
    <text x="146" y="1045" fill="url(#ink)" font-size="190">Aegis</text>
    <text x="866" y="1045" fill="url(#red)" font-size="190">X</text>
  </g>
</svg>
