    <path d="M330 188 C270 252 244 329 250 420 C258 529 318 620 402 696 L555 832 C581 855 619 855 645 832 L798 696 C882 620 942 529 950 420 C956 329 930 252 870 188" stroke-width="36"/>
    <path d="M368 302 L832 714" stroke-width="32"/>
    <path d="M832 302 L368 714" stroke-width="32"/>
  </g>
  <g font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="700" letter-spacing="-12">
    <text x="140" y="1040" fill="url(#ink)" font-size="190">Aegis</text>
    <text x="874" y="1040" fill="url(#red)" font-size="190">X</text>
  </g>
</svg>
