      <stop offset="0" stop-color="#ff3344"/>
      <stop offset="0.52" stop-color="#ed111f"/>
      <stop offset="1" stop-color="#a90012"/>
    </linearGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#22262d"/>
