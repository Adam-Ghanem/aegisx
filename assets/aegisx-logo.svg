<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200" role="img" aria-labelledby="title desc">
  <title id="title">AegisX official logo</title>
  <desc id="desc">Red shield and X emblem with the AegisX wordmark on a black background.</desc>
  <defs>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff3b42"/>
      <stop offset="0.42" stop-color="#ff141d"/>
      <stop offset="0.72" stop-color="#dd0713"/>
      <stop offset="1" stop-color="#95000b"/>
    </linearGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#24262b"/>
      <stop offset="1" stop-color="#08090b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="9" stdDeviation="8" flood-color="#000" flood-opacity="0.42"/>
