<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1120" viewBox="0 0 1200 1120" role="img" aria-labelledby="title desc">
  <title id="title">AegisX official logo</title>
  <desc id="desc">A glossy red shield intersected by an X above the black Aegis wordmark and red X.</desc>
  <defs>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff4048"/>
      <stop offset="0.42" stop-color="#ff101b"/>
      <stop offset="0.72" stop-color="#dc0712"/>
      <stop offset="1" stop-color="#97000b"/>
    </linearGradient>
    <linearGradient id="black" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2b2d31"/>
      <stop offset="1" stop-color="#050608"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="9" stdDeviation="8" flood-color="#210006" flood-opacity="0.28"/>
    </filter>
  </defs>

  <g fill="none" stroke="url(#red)" stroke-linecap="round" stroke-linejoin="round" filter="url(#shadow)">
    <path d="M320 150 C390 92 490 65 600 65 C710 65 810 92 880 150" stroke-width="34"/>
    <path d="M320 150 C260 215 235 292 240 385 C246 494 305 585 390 660 L555 807 C581 830 619 830 645 807 L810 660 C895 585 954 494 960 385 C965 292 940 215 880 150" stroke-width="34"/>
    <path d="M365 270 L835 690" stroke-width="31"/>
    <path d="M835 270 L365 690" stroke-width="31"/>
  </g>

  <g font-family="Inter, Segoe UI, Arial, sans-serif" font-size="190" font-weight="700" letter-spacing="-10">
    <text x="160" y="1030" fill="url(#black)">Aegis</text>
    <text x="850" y="1030" fill="url(#red)">X</text>
  </g>
</svg>
